<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="krishi-api-base" content="https://d2edjmigl4cl66.cloudfront.net"/>
<meta name="description" content="Chat with Krishi Mitra — your 24/7 AI farming advisor in Hindi, English, Telugu, Tamil, Marathi and Bengali."/>
<title>Krishi Mitra Chat — Krishi Rakshak</title>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#22c55e"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--g:#22c55e;--lime:#a8ff3e;--bg:#070f09;--card:rgba(255,255,255,.05);--bdr:rgba(255,255,255,.08);--t1:#f0fdf4;--tm:rgba(134,239,172,.45);--fh:'Syne',sans-serif;--fb:'DM Sans',sans-serif;--fm:'JetBrains Mono',monospace;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{background:radial-gradient(ellipse 90% 65% at 50% -5%,#2a6e3a 0%,#183421 40%,#112a17 70%);color:var(--t1);font-family:var(--fb);display:flex;flex-direction:column;}
a{color:inherit;text-decoration:none;}
/* NAV */
.nav{background:rgba(7,15,9,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--bdr);padding:0 16px;flex-shrink:0;}
.nav-i{max-width:1200px;margin:0 auto;height:52px;display:flex;align-items:center;gap:10px;}
.nav-logo{font-family:var(--fh);font-weight:800;font-size:.9rem;display:flex;align-items:center;gap:6px;}
.nav-links{display:flex;gap:2px;margin-left:auto;flex-wrap:wrap;}
.nav-links a{color:var(--tm);font-size:.7rem;padding:4px 8px;border-radius:6px;transition:all .2s;}
.nav-links a:hover,.nav-links a.act{color:var(--t1);background:rgba(255,255,255,.06);}
/* CHAT LAYOUT */
.chat-wrap{flex:1;display:flex;flex-direction:column;max-width:760px;width:100%;margin:0 auto;padding:0 12px;}
/* TOP BAR */
.chat-topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 0 8px;flex-shrink:0;flex-wrap:wrap;gap:8px;}
.chat-title{font-family:var(--fh);font-size:1rem;font-weight:700;display:flex;align-items:center;gap:8px;}
.online-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;box-shadow:0 0 6px rgba(34,197,94,.6);}
.new-chat-btn{padding:6px 14px;background:rgba(255,255,255,.04);border:1px solid var(--bdr);border-radius:8px;font-size:.75rem;color:var(--tm);cursor:pointer;transition:all .2s;}
.new-chat-btn:hover{border-color:rgba(74,222,128,.22);color:var(--t1);}
/* LANG SELECTOR */
.lang-bar{display:flex;gap:6px;padding:0 0 10px;overflow-x:auto;flex-shrink:0;scrollbar-width:none;}
.lang-bar::-webkit-scrollbar{display:none;}
.lang-btn{padding:6px 14px;background:rgba(255,255,255,.04);border:1px solid var(--bdr);border-radius:99px;font-size:.78rem;cursor:pointer;white-space:nowrap;transition:all .2s;color:var(--tm);}
.lang-btn.active{background:rgba(34,197,94,.15);border-color:rgba(34,197,94,.35);color:#4ade80;}
/* MESSAGES */
.messages{flex:1;overflow-y:auto;padding:8px 0 12px;display:flex;flex-direction:column;gap:12px;scrollbar-width:thin;scrollbar-color:rgba(34,197,94,.2) transparent;}
.messages::-webkit-scrollbar{width:4px;}
.messages::-webkit-scrollbar-thumb{background:rgba(34,197,94,.2);border-radius:4px;}
/* BUBBLES */
.msg{display:flex;gap:10px;max-width:85%;}
.msg.user{align-self:flex-end;flex-direction:row-reverse;}
.msg.bot{align-self:flex-start;}
.msg-avatar{width:30px;height:30px;border-radius:50%;background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.25);display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0;margin-top:2px;}
.msg-body{display:flex;flex-direction:column;gap:3px;}
.msg-name{font-size:.65rem;color:var(--tm);padding:0 4px;}
.msg.user .msg-name{text-align:right;}
.bubble{padding:11px 14px;border-radius:14px;font-size:.86rem;line-height:1.55;white-space:pre-wrap;word-break:break-word;}
.msg.bot .bubble{background:rgba(255,255,255,.05);border:1px solid var(--bdr);border-radius:4px 14px 14px 14px;}
.msg.user .bubble{background:rgba(34,197,94,.18);border:1px solid rgba(34,197,94,.28);border-radius:14px 4px 14px 14px;color:#f0fdf4;}
.msg-time{font-size:.62rem;color:rgba(134,239,172,.3);padding:0 4px;}
/* Streaming cursor */
.stream-cursor{display:inline-block;width:2px;height:.9em;background:#22c55e;margin-left:2px;vertical-align:middle;animation:blink .7s step-end infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
/* WhatsApp share btn on bot messages */
.wa-share-btn{display:inline-flex;align-items:center;gap:5px;margin-top:8px;padding:4px 10px;border-radius:8px;background:rgba(37,211,102,.1);border:1px solid rgba(37,211,102,.25);color:#25d366;font-size:.7rem;cursor:pointer;transition:all .2s;font-family:var(--fb);}
.wa-share-btn:hover{background:rgba(37,211,102,.18);border-color:rgba(37,211,102,.4);}
.msg.user .msg-time{text-align:right;}
/* TYPING */
.typing-dots{display:flex;gap:4px;padding:12px 14px;background:rgba(255,255,255,.05);border:1px solid var(--bdr);border-radius:4px 14px 14px 14px;width:fit-content;}
.typing-dots span{width:7px;height:7px;border-radius:50%;background:rgba(134,239,172,.4);animation:bounce .9s infinite;}
.typing-dots span:nth-child(2){animation-delay:.15s;}
.typing-dots span:nth-child(3){animation-delay:.3s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
/* CHIPS */
.chips-row{display:flex;gap:7px;padding:8px 0 6px;overflow-x:auto;flex-shrink:0;scrollbar-width:none;}
.chips-row::-webkit-scrollbar{display:none;}
.chip{padding:7px 13px;background:rgba(255,255,255,.04);border:1px solid var(--bdr);border-radius:99px;font-size:.76rem;cursor:pointer;white-space:nowrap;transition:all .2s;color:var(--tm);}
.chip:hover{border-color:rgba(74,222,128,.22);color:var(--t1);background:rgba(255,255,255,.07);}
/* INPUT BAR */
.input-bar{display:flex;gap:8px;padding:10px 0 16px;flex-shrink:0;align-items:flex-end;}
.input-wrap{flex:1;background:rgba(255,255,255,.05);border:1px solid var(--bdr);border-radius:12px;display:flex;align-items:flex-end;transition:border .2s;}
.input-wrap:focus-within{border-color:rgba(34,197,94,.35);}
#chat-input{flex:1;background:none;border:none;outline:none;padding:11px 14px;color:var(--t1);font-family:var(--fb);font-size:.88rem;resize:none;max-height:120px;line-height:1.4;}
#chat-input::placeholder{color:rgba(134,239,172,.3);}
.mic-btn{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.04);border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;flex-shrink:0;font-size:1rem;}
.mic-btn:hover{border-color:rgba(74,222,128,.22);}
.mic-btn.recording{background:rgba(239,68,68,.2);border-color:rgba(239,68,68,.4);animation:pulse .8s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.3)}50%{box-shadow:0 0 0 6px rgba(239,68,68,.0)}}
.send-btn{width:42px;height:42px;border-radius:50%;background:var(--g);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:opacity .2s;flex-shrink:0;}
.send-btn:hover{opacity:.85;}
.send-btn:disabled{opacity:.3;cursor:not-allowed;}
.send-btn svg{width:18px;height:18px;}
</style>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="nav.css"/>
</head>
<body data-page="chat">
<div class="chat-wrap">
  <div class="chat-topbar">
    <div class="chat-title"><div class="online-dot"></div>Krishi Mitra <span style="font-size:.72rem;color:var(--tm);font-family:var(--fm);font-weight:400">AI Farm Advisor</span></div>
    <button class="new-chat-btn" onclick="newConversation()">🗑️ New conversation</button>
  </div>
  <div class="lang-bar" id="lang-bar">
    <button class="lang-btn" data-lang="Hindi" data-code="hi-IN" onclick="setLang(this)">🇮🇳 हिंदी</button>
    <button class="lang-btn active" data-lang="English" data-code="en-IN" onclick="setLang(this)">🇬🇧 English</button>
    <button class="lang-btn" data-lang="Telugu" data-code="te-IN" onclick="setLang(this)">తెలుగు</button>
    <button class="lang-btn" data-lang="Tamil" data-code="ta-IN" onclick="setLang(this)">தமிழ்</button>
    <button class="lang-btn" data-lang="Marathi" data-code="mr-IN" onclick="setLang(this)">मराठी</button>
    <button class="lang-btn" data-lang="Bengali" data-code="bn-IN" onclick="setLang(this)">বাংলা</button>
  </div>
  <div class="messages" id="messages"></div>
  <div class="chips-row">
    <div class="chip" onclick="sendChip(this)">🌿 My crop is diseased</div>
    <div class="chip" onclick="sendChip(this)">💊 What fertiliser to apply?</div>
    <div class="chip" onclick="sendChip(this)">🌦️ Weather farming advice</div>
    <div class="chip" onclick="sendChip(this)">🏛️ Government schemes</div>
    <div class="chip" onclick="sendChip(this)">💰 Mandi prices today</div>
    <div class="chip" onclick="sendChip(this)">💧 Irrigation help</div>
  </div>
  <div class="input-bar">
    <button class="mic-btn" id="mic-btn" title="Hold to speak" onmousedown="startMic()" onmouseup="stopMic()" ontouchstart="startMic()" ontouchend="stopMic()">🎤</button>
    <div class="input-wrap">
      <textarea id="chat-input" placeholder="Ask Krishi Mitra anything about your farm…" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    </div>
    <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<script>
const API=window.KRISHI_API_BASE||'http://127.0.0.1:8000';
const LS_HIST='kr_chat_history';
const LS_LANG='kr_chat_lang';
let curLang='English',curCode='en-IN',recognition=null,isRecording=false;

// ── Language ──────────────────────────────────────────────────────────────────
function setLang(btn){
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  curLang=btn.dataset.lang;curCode=btn.dataset.code;
  localStorage.setItem(LS_LANG,JSON.stringify({lang:curLang,code:curCode}));
}
(function initLang(){
  try{const s=JSON.parse(localStorage.getItem(LS_LANG));if(s){curLang=s.lang;curCode=s.code;document.querySelectorAll('.lang-btn').forEach(b=>{if(b.dataset.lang===curLang){b.classList.add('active');}else b.classList.remove('active');});}}catch{}
})();

// ── History ───────────────────────────────────────────────────────────────────
function getHistory(){try{return JSON.parse(localStorage.getItem(LS_HIST))||[];}catch{return[];}}
function saveHistory(h){localStorage.setItem(LS_HIST,JSON.stringify(h.slice(-20)));}
function getCropContext(){
  try{
    const diag=JSON.parse(localStorage.getItem('kr_last_diagnosis'));
    if(diag)return`Farmer recently detected ${diag.disease} with ${Math.round(diag.confidence*100)}% confidence, severity: ${diag.severity}`;
    const sess=JSON.parse(localStorage.getItem('kr_session'));
    if(sess?.crop)return`Farmer grows ${sess.crop}`;
  }catch{}
  return'Not specified';
}

// ── Render messages ───────────────────────────────────────────────────────────
function renderMessages(){
  const hist=getHistory();
  const el=document.getElementById('messages');
  el.innerHTML='';
  if(!hist.length){addBotBubble("Namaste! 🌱 I'm Krishi Mitra, your personal farm advisor. Ask me anything about your crops, diseases, fertilisers, government schemes, or market prices. I'm here to help!",false);}
  else{hist.forEach(m=>{if(m.role==='user')addUserBubble(m.content,false);else addBotBubble(m.content,false);});}
  scrollBottom();
}

function addUserBubble(text,save=true){
  const el=document.getElementById('messages');
  const t=new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  const div=document.createElement('div');div.className='msg user';
  div.innerHTML=`<div class="msg-body"><div class="msg-name">You</div><div class="bubble">${escHtml(text)}</div><div class="msg-time">${t}</div></div>`;
  el.appendChild(div);scrollBottom();
  if(save){const h=getHistory();h.push({role:'user',content:text});saveHistory(h);}
}

function addBotBubble(text,save=true,stream=false){
  const el=document.getElementById('messages');
  const t=new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  const div=document.createElement('div');div.className='msg bot';
  const waMsg=encodeURIComponent(`🌿 Krishi Mitra says:\n\n${text}\n\nPowered by Krishi Rakshak`);
  div.innerHTML=`<div class="msg-avatar">🌿</div><div class="msg-body"><div class="msg-name">Krishi Mitra</div><div class="bubble" id="bubble-${Date.now()}"></div><div class="msg-time">${t}</div><a class="wa-share-btn" href="https://wa.me/?text=${waMsg}" target="_blank" rel="noopener">📱 Share on WhatsApp</a></div>`;
  el.appendChild(div);scrollBottom();
  const bubble=div.querySelector('.bubble');
  if(stream){
    streamText(bubble,text,()=>{
      if(save){const h=getHistory();h.push({role:'assistant',content:text});saveHistory(h);}
    });
  } else {
    bubble.innerHTML=escHtml(text);
    if(save){const h=getHistory();h.push({role:'assistant',content:text});saveHistory(h);}
  }
}

function streamText(el,text,onDone){
  let i=0;
  el.innerHTML='';
  const cursor=document.createElement('span');cursor.className='stream-cursor';
  el.appendChild(cursor);
  function tick(){
    if(i<text.length){
      cursor.before(document.createTextNode(text[i]));
      i++;
      scrollBottom();
      // Vary speed: faster for spaces, slower at punctuation
      const ch=text[i-1];
      const delay=ch==='.'||ch==='!'||ch==='?'?60:ch===','?30:ch===' '?8:12;
      setTimeout(tick,delay);
    } else {
      cursor.remove();
      if(onDone)onDone();
    }
  }
  tick();
}

function showTyping(){
  const el=document.getElementById('messages');
  const div=document.createElement('div');div.className='msg bot';div.id='typing-indicator';
  div.innerHTML=`<div class="msg-avatar">🌿</div><div class="msg-body"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  el.appendChild(div);scrollBottom();
}
function hideTyping(){document.getElementById('typing-indicator')?.remove();}
function scrollBottom(){const el=document.getElementById('messages');el.scrollTop=el.scrollHeight;}
function escHtml(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}

// ── Send ──────────────────────────────────────────────────────────────────────
async function sendMessage(){
  const inp=document.getElementById('chat-input');
  const text=inp.value.trim();if(!text)return;
  inp.value='';inp.style.height='';
  document.getElementById('send-btn').disabled=true;
  addUserBubble(text);
  showTyping();

  try{
    const res=await fetch(`${API}/chat/stream`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:text,language:curLang,crop_context:getCropContext(),history:getHistory().slice(-18)})
    });
    hideTyping();
    if(!res.ok){const e=await res.json().catch(()=>({}));addBotBubble(e.detail||'Sorry, could not connect.',true,false);document.getElementById('send-btn').disabled=false;return;}

    // Create streaming bubble
    const el=document.getElementById('messages');
    const t=new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
    const div=document.createElement('div');div.className='msg bot';
    div.innerHTML=`<div class="msg-avatar">🌿</div><div class="msg-body"><div class="msg-name">Krishi Mitra</div><div class="bubble" id="stream-bubble"></div><div class="msg-time">${t}</div></div>`;
    el.appendChild(div);scrollBottom();
    const bubble=document.getElementById('stream-bubble');

    const reader=res.body.getReader();
    const decoder=new TextDecoder();
    let fullText='';let buffer='';

    while(true){
      const {done,value}=await reader.read();
      if(done)break;
      buffer+=decoder.decode(value,{stream:true});
      const lines=buffer.split('\n');
      buffer=lines.pop();
      for(const line of lines){
        if(!line.startsWith('data: '))continue;
        const chunk=line.slice(6);
        if(chunk==='[DONE]')break;
        if(chunk.startsWith('[ERROR]')){bubble.textContent='Sorry, AI error. Please try again.';break;}
        fullText+=chunk.replace(/\\n/g,'\n');
        bubble.innerHTML=escHtml(fullText);
        scrollBottom();
      }
    }

    // Add WhatsApp share + save history
    if(fullText){
      const waMsg=encodeURIComponent(`🌿 Krishi Mitra says:\n\n${fullText}\n\nPowered by Krishi Rakshak`);
      div.querySelector('.msg-body').insertAdjacentHTML('beforeend',`<a class="wa-share-btn" href="https://wa.me/?text=${waMsg}" target="_blank" rel="noopener">📱 Share on WhatsApp</a>`);
      const h=getHistory();h.push({role:'assistant',content:fullText});saveHistory(h);
    }
  }catch{
    hideTyping();
    // Fallback to non-streaming
    try{
      const res=await fetch(`${API}/chat`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text,language:curLang,crop_context:getCropContext(),history:getHistory().slice(-18)})});
      if(res.ok){const d=await res.json();addBotBubble(d.reply,true,true);}
      else addBotBubble('Sorry, could not connect to the server.',true,false);
    }catch{addBotBubble('Sorry, could not connect to the server. Make sure the backend is running.',true,false);}
  }
  document.getElementById('send-btn').disabled=false;
}

function sendChip(el){document.getElementById('chat-input').value=el.textContent.replace(/^[^\s]+\s/,'');document.getElementById('send-btn').disabled=false;sendMessage();}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';document.getElementById('send-btn').disabled=!el.value.trim();}
document.getElementById('chat-input').addEventListener('input',function(){document.getElementById('send-btn').disabled=!this.value.trim();});

function newConversation(){if(!confirm('Start a new conversation? Current chat will be cleared.'))return;localStorage.removeItem(LS_HIST);renderMessages();}

// ── Voice input ───────────────────────────────────────────────────────────────
function startMic(){
  if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)){alert('Voice input not supported in this browser.');return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();recognition.lang=curCode;recognition.interimResults=false;recognition.maxAlternatives=1;
  recognition.onresult=e=>{const t=e.results[0][0].transcript;document.getElementById('chat-input').value=t;document.getElementById('send-btn').disabled=false;autoResize(document.getElementById('chat-input'));sendMessage();};
  recognition.onerror=()=>{document.getElementById('mic-btn').classList.remove('recording');};
  recognition.start();isRecording=true;document.getElementById('mic-btn').classList.add('recording');
}
function stopMic(){if(recognition){recognition.stop();isRecording=false;document.getElementById('mic-btn').classList.remove('recording');}}

renderMessages();
</script>
<script src="config.js"></script>
<script src="nav.js"></script>
</body></html>
